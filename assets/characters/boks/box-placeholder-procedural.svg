      <stop offset="0%" stop-color="#6ed66e"/>
      <stop offset="55%" stop-color="#45b554"/>
      <stop offset="100%" stop-color="#2f9446"/>
    </linearGradient>
    <linearGradient id="boxTop" x1="0%" y1="0%" x2="0%" y2="100%">
