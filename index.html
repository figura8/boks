<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <title>Cubetto</title>
  <link rel="manifest" href="manifest.webmanifest">
  <style>
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
      -webkit-tap-highlight-color: transparent; user-select: none;
    }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #ece6dc;
      font-family: system-ui, sans-serif;
    }

    /* Full-screen column layout */
    #app {
      position: fixed; inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 6px 10px 10px;
      gap: 6px;
    }

    /* Grid wrapper: fixed size set by JS */
    #gridWrap {
      position: relative;
      width: 100%;
      max-width: 460px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Grid: square, sized by JS after measuring available height */
    #gameGrid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      grid-template-rows: repeat(6, 1fr);
      gap: 3px;
      position: relative;
      flex-shrink: 0;
    }
    .cell {
      background: rgba(245,241,235,0.55);
      border: none;
      border-radius: 7px;
    }
    .cell.hi { background: rgba(120,180,255,0.55); }

    #sprite {
      position: absolute;
      z-index: 20;
      touch-action: none;
      cursor: grab;
    }
    #sprite:active { cursor: grabbing; }
    #sprite.moving { animation: wg .18s linear infinite; }
    @keyframes wg {
      0%,100% { transform: rotate(0deg); }
      30%      { transform: rotate(-3deg) translateY(-1px); }
      70%      { transform: rotate(3deg)  translateY(-1px); }
    }

    /* Fixed bottom section */
    #bottom {
      width: 100%;
      max-width: 460px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    /* Available blocks row */
    #blocksRow {
      width: 100%;
      background: #faf5ee;
      border-radius: 12px;
      border: none;
      padding: 8px 12px;
      display: flex;
      justify-content: space-evenly;
      align-items: center;
    }
    .ablock {
      flex-shrink: 0;
      touch-action: none;
      cursor: grab;
      border-radius: 5px;
      box-shadow: 0 2px 6px rgba(0,0,0,.2);
    }

    /* Program board */
    #boardRow {
      width: 100%;
      background: #faf5ee;
      border-radius: 12px;
      border: none;
      box-shadow: none;
      padding: 7px;
    }
    #boardGrid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 5px;
    }
    .pslot {
      background: #f5f1eb;
      border: none;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      padding: 3px 2px 5px;
      touch-action: none;
      transition: background .1s;
    }
    .pslot.over   { background: #d8eeff; border-color: #7ab8f5; }
    .pslot.active .dot {
      background: #ffc107;
      box-shadow: 0 0 5px rgba(255,193,7,.9);
      animation: bd .6s infinite;
    }
    @keyframes bd { 0%,100%{transform:scale(1)} 50%{transform:scale(1.6)} }
    .sinner { display:flex; align-items:center; justify-content:center; }
    .pblock  { border-radius: 4px; touch-action: none; cursor: grab; }
    .dot     { width: 4px; height: 4px; background: #c0b090; border-radius: 50%; flex-shrink: 0; transition: all .2s; }

    /* Run button */
    #runBtn {
      width: 52px; height: 52px;
      flex-shrink: 0;
      border-radius: 10px;
      border: none;
      background: #f5f1eb;
      box-shadow: 0 4px 0 #c8bfb0;
      color: #5a4a3a;
      font-size: 1.2em;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      padding-left: 3px;
      touch-action: manipulation;
      transition: transform .1s, box-shadow .1s;
      -webkit-appearance: none;
      appearance: none;
      -webkit-tap-highlight-color: transparent;
      outline: none;
    }
    #runBtn:active, #runBtn:focus { 
      transform: translateY(4px); 
      box-shadow: 0 0 0 #c8bfb0;
      background: #f5f1eb;
      outline: none;
    }
    #runBtn.running {
      background: #f5f1eb;
      box-shadow: 0 4px 0 #c8bfb0;
      padding-left: 0;
      animation: pb 1s ease-in-out infinite;
    }
    @keyframes pb { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }

    /* Ghost for drag */
    #ghost {
      position: fixed; z-index: 9999;
      pointer-events: none;
      transform: translate(-50%, -50%) scale(1.1);
      opacity: .88; display: none; border-radius: 5px;
    }

    /* Toast */
    #toast {
      position: fixed; bottom: 70px;
      left: 50%; transform: translateX(-50%);
      background: white; border-radius: 16px;
      padding: 5px 14px; font-size: .85em; font-weight: 700;
      box-shadow: 0 3px 10px rgba(0,0,0,.15);
      opacity: 0; transition: opacity .3s;
      pointer-events: none; white-space: nowrap; z-index: 200;
    }
    #toast.show { opacity: 1; }
    #toast.win  { color: #3a9a3e; }
  </style>
</head>
<body>
<div id="app">
  <!-- Row 1: grid (flexible) -->
  <div id="gridWrap">
    <canvas id="bgCanvas" style="position:absolute;inset:0;pointer-events:none;border-radius:7px;"></canvas>
    <div id="gameGrid"></div>
    <div id="sprite"></div>
  </div>

  <!-- Row 2: fixed bottom section -->
  <div id="bottom">
    <div id="blocksRow"></div>
    <div id="boardRow"><div id="boardGrid"></div></div>
    <button id="runBtn" onclick="run()">▶</button>
  </div>
</div>
<div id="ghost"></div>
<div id="toast"></div>

<script>
// ═══ CONSTANTS ═══
const COLS = 6, ROWS = 6, SLOTS = 12;
const GOAL = {x:5,y:5}, START = {x:2,y:2};
let ori = 'right';
const MOVE_MS = 650, TURN_MS = 320, STEP_MS = 380;
const POOL = {
  forward: {dir:'forward', color:'#7edcc4'},
  left:    {dir:'left',    color:'#ffe089'},
  right:   {dir:'right',  color:'#ff8a8a'}
};

// ═══ STATE ═══
let pos = {...START};
let running = false, animating = false, idN = 0;
const avail = ['forward','left','right'].map((d,i) => ({id:`${d}${i}`, ...POOL[d]}));
const prog = Array(SLOTS).fill(null);

// ═══ AUDIO ═══
let ac;
const AC = () => { if(!ac) ac = new (window.AudioContext||window.webkitAudioContext)(); if(ac.state==='suspended') ac.resume(); return ac; };
function T(f,t,s,d,v=.12) {
  const c=AC(),o=c.createOscillator(),g=c.createGain();
  o.type=t; o.frequency.setValueAtTime(f,c.currentTime+s);
  g.gain.setValueAtTime(v,c.currentTime+s);
  g.gain.exponentialRampToValueAtTime(.0001,c.currentTime+s+d);
  o.connect(g); g.connect(c.destination);
  o.start(c.currentTime+s); o.stop(c.currentTime+s+d+.05);
}
const sStart = () => [400,500,400,600,800].forEach((f,i) => T(f,'square',i*.08,.1,.1));
const sStep  = () => { T(300,'square',0,.07,.1); T(500,'square',.09,.07,.1); };
const sEnd   = () => [523,659,784,1047,784,659,523].forEach((f,i) => T(f,'square',i*.09,.12,.12));
const sErr   = () => { T(300,'sine',0,.18,.2); T(180,'sine',.2,.22,.18); };

// ═══ UTILS ═══
const sleep = ms => new Promise(r => setTimeout(r, ms));
function toast(msg, cls='') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = msg ? 'show '+cls : '';
  clearTimeout(el._t); if(msg) el._t = setTimeout(() => el.className='', 3000);
}

// ═══ CLIP PATHS ═══
const clip = dir =>
  dir==='forward' ? 'polygon(0 10%,80% 10%,100% 50%,80% 90%,0 90%)' :
  dir==='left'    ? 'polygon(50% 0,100% 32%,100% 100%,0 100%,0 32%)' :
                    'polygon(0 0,100% 0,100% 68%,50% 100%,0 68%)';

// ═══ BUILD BLOCK ═══
function mkB(block, w, h, cls='') {
  const el = document.createElement('div');
  el.className = cls;
  el.dataset.dir = block.dir || block.direction;
  el.dataset.bid = block.id;
  el.style.cssText = `width:${w}px;height:${h}px;background:${block.color};clip-path:${clip(el.dataset.dir)};flex-shrink:0;border-radius:4px;`;
  return el;
}

// ═══ GRID ═══
function initGrid() {
  const g = document.getElementById('gameGrid');
  g.innerHTML = '';
  for(let y=0; y<ROWS; y++) for(let x=0; x<COLS; x++) {
    const c = document.createElement('div');
    c.className = 'cell'; c.dataset.cx = x; c.dataset.cy = y;
    g.appendChild(c);
  }
}

// ═══ SIZE THE GRID AS A SQUARE ═══
function sizeGrid() {
  const wrap  = document.getElementById('gridWrap');
  const grid  = document.getElementById('gameGrid');
  const app   = document.getElementById('app');
  const bot   = document.getElementById('bottom');

  // Measure what bottom actually needs
  const appH  = app.clientHeight;
  const botH  = bot.offsetHeight;
  const availH = appH - botH - 6 - 6 - 6; // gaps + padding
  const availW = wrap.clientWidth;
  const sq = Math.floor(Math.min(availH, availW));

  grid.style.width  = sq + 'px';
  grid.style.height = sq + 'px';
  wrap.style.height = sq + 'px'; // shrink wrap to exact grid size, no extra space
}

// ═══ SPRITE ═══
function svgRobot(o) {
  const rot = { right: 0, down: 90, left: 180, up: 270 };
  const deg = rot[o];
  return `<svg width="100%" height="100%" viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg">
    <g transform="rotate(${deg} 25 25)">
      <rect x="4" y="4" width="42" height="42" fill="#F5DEB3" rx="7" ry="7" stroke="#b0a898" stroke-width="1.5"/>
      <path d="M32 25 L20 16 L23 25 L20 34Z" fill="#5a4a3a"/>
    </g>
  </svg>`;
}

function cellPos(x, y) {
  const cell = document.querySelector(`.cell[data-cx="${x}"][data-cy="${y}"]`);
  const wrap = document.getElementById('gridWrap');
  if(!cell || !wrap) return null;
  const cr = cell.getBoundingClientRect(), wr = wrap.getBoundingClientRect();
  return { l: cr.left-wr.left, t: cr.top-wr.top, w: cr.width, h: cr.height };
}

function syncSprite() {
  const r = cellPos(pos.x, pos.y);
  const s = document.getElementById('sprite');
  if(!r || !s) return;
  s.style.left = r.l+'px'; s.style.top = r.t+'px';
  s.style.width = r.w+'px'; s.style.height = r.h+'px';
  s.innerHTML = svgRobot(ori);
}

async function animTo(tx, ty) {
  if(animating) return;
  animating = true;
  const s = document.getElementById('sprite');
  const fr = cellPos(pos.x,pos.y), to = cellPos(tx,ty);
  if(!fr||!to) { pos={x:tx,y:ty}; syncSprite(); animating=false; return; }
  s.classList.add('moving');
  const a = s.animate(
    [{left:fr.l+'px',top:fr.t+'px'},{left:to.l+'px',top:to.t+'px'}],
    {duration:MOVE_MS, easing:'cubic-bezier(.2,.9,.2,1)', fill:'forwards'}
  );
  await a.finished.catch(()=>{});
  s.style.left=to.l+'px'; s.style.top=to.t+'px';
  s.classList.remove('moving');
  pos={x:tx,y:ty}; animating=false;
}

// ═══ SPRITE DRAG ═══
function setupSpriteDrag() {
  const s = document.getElementById('sprite');
  function start(cx,cy) {
    if(running||animating) return false;
    const g = document.getElementById('ghost');
    const w = s.offsetWidth;
    g.innerHTML = svgRobot(ori);
    g.style.cssText = `display:block;width:${w}px;height:${w}px;left:${cx}px;top:${cy}px;`;
    s.style.opacity = '0.3'; return true;
  }
  function move(cx,cy) {
    const g = document.getElementById('ghost');
    g.style.left=cx+'px'; g.style.top=cy+'px';
    g.style.display='none';
    const u = document.elementFromPoint(cx,cy);
    g.style.display='block';
    document.querySelectorAll('.cell.hi').forEach(c=>c.classList.remove('hi'));
    u?.closest('.cell')?.classList.add('hi');
  }
  async function end(cx,cy) {
    document.getElementById('ghost').style.display='none';
    s.style.opacity='1';
    document.querySelectorAll('.cell.hi').forEach(c=>c.classList.remove('hi'));
    const u = document.elementFromPoint(cx,cy);
    const cell = u?.closest('.cell');
    if(cell) await animTo(+cell.dataset.cx, +cell.dataset.cy);
    syncSprite();
  }
  s.addEventListener('touchstart',e=>{
    e.preventDefault(); e.stopPropagation();
    const t=e.touches[0]; if(!start(t.clientX,t.clientY)) return;
    const mm=e=>{e.preventDefault();move(e.touches[0].clientX,e.touches[0].clientY);};
    const mu=e=>{e.preventDefault();end(e.changedTouches[0].clientX,e.changedTouches[0].clientY);s.removeEventListener('touchmove',mm);s.removeEventListener('touchend',mu);};
    s.addEventListener('touchmove',mm,{passive:false});
    s.addEventListener('touchend',mu,{passive:false});
  },{passive:false});
  s.addEventListener('mousedown',e=>{
    e.preventDefault(); if(!start(e.clientX,e.clientY)) return;
    const mm=e=>move(e.clientX,e.clientY);
    const mu=e=>{end(e.clientX,e.clientY);document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);};
    document.addEventListener('mousemove',mm);
    document.addEventListener('mouseup',mu);
  });
}

// ═══ PROCEDURAL BACKGROUND ═══
function drawBackground() {
  const canvas = document.getElementById('bgCanvas');
  const grid   = document.getElementById('gameGrid');
  if (!canvas || !grid) return;
  const rect = grid.getBoundingClientRect();
  const wrap = document.getElementById('gridWrap').getBoundingClientRect();
  const S = Math.round(rect.width);
  if (!S) return;
  canvas.width  = S;
  canvas.height = S;
  // Position canvas exactly over gameGrid within gridWrap
  canvas.style.left   = (rect.left - wrap.left) + 'px';
  canvas.style.top    = (rect.top  - wrap.top)  + 'px';
  canvas.style.width  = S + 'px';
  canvas.style.height = S + 'px';
  const cx = canvas.getContext('2d');

  const r = (min,max) => min + Math.random()*(max-min);
  const seed = 42; // deterministic-ish using array
  let si = 0;
  const rands = Array.from({length:200},(_,i)=>{
    si = (si*1664525+1013904223)&0xffffffff;
    return (si>>>0)/4294967296;
  });
  let ri = 0;
  const rn = (mn,mx) => mn + rands[ri++%rands.length]*(mx-mn);

  // ── BACKGROUND: sand gradient ──
  const grad = cx.createLinearGradient(0,0,S,S);
  grad.addColorStop(0,   '#f0dda8');
  grad.addColorStop(0.4, '#e8c87a');
  grad.addColorStop(0.7, '#dbb96a');
  grad.addColorStop(1,   '#c8a050');
  cx.fillStyle = grad;
  cx.fillRect(0,0,S,S);

  // ── RIVER: diagonal blue strip ──
  cx.save();
  const rg = cx.createLinearGradient(S*0.1, 0, S*0.32, S);
  rg.addColorStop(0,'#5aa0d0'); rg.addColorStop(0.5,'#7ec8e8'); rg.addColorStop(1,'#4888b8');
  cx.fillStyle = rg;
  cx.beginPath();
  cx.moveTo(S*0.08, 0);
  cx.bezierCurveTo(S*0.18,S*0.2, S*0.12,S*0.5, S*0.22,S*0.75);
  cx.bezierCurveTo(S*0.26,S*0.85, S*0.30,S*0.92, S*0.28,S);
  cx.lineTo(S*0.38, S);
  cx.bezierCurveTo(S*0.36,S*0.9, S*0.32,S*0.8, S*0.28,S*0.65);
  cx.bezierCurveTo(S*0.24,S*0.45, S*0.30,S*0.18, S*0.20,0);
  cx.closePath();
  cx.fill();
  // river ripples
  cx.strokeStyle='rgba(255,255,255,0.3)'; cx.lineWidth=1.5;
  for(let i=0;i<5;i++){
    const ty = S*(0.1+i*0.18);
    cx.beginPath();
    cx.moveTo(S*0.12,ty);
    cx.quadraticCurveTo(S*0.18,ty-S*0.02, S*0.24,ty);
    cx.stroke();
  }
  cx.restore();

  // ── GREEN OASIS banks ──
  cx.save();
  cx.fillStyle='#7ab870';
  [[S*0.06,S*0.1,S*0.08,S*0.14],[S*0.22,S*0.4,S*0.1,S*0.12],
   [S*0.14,S*0.68,S*0.09,S*0.11],[S*0.26,S*0.82,S*0.08,S*0.1]].forEach(([ex,ey,ew,eh])=>{
    cx.beginPath(); cx.ellipse(ex,ey,ew,eh,0.3,0,Math.PI*2); cx.fill();
  });
  cx.restore();

  // ── SAND DUNES ──
  cx.save();
  cx.globalAlpha = 0.22;
  cx.fillStyle = '#c8903a';
  [[S*0.65,S*0.15,S*0.22,S*0.08],[S*0.75,S*0.35,S*0.18,S*0.06],
   [S*0.55,S*0.6, S*0.25,S*0.09],[S*0.80,S*0.75,S*0.15,S*0.05]].forEach(([dx,dy,dw,dh])=>{
    cx.beginPath(); cx.ellipse(dx,dy,dw,dh,0.2,0,Math.PI*2); cx.fill();
  });
  cx.globalAlpha=1;
  cx.restore();

  function drawPyramid(px,py,base,h) {
    // shadow
    cx.fillStyle='rgba(0,0,0,0.13)';
    cx.beginPath(); cx.ellipse(px+base*0.3,py+4,base*0.5,5,0,0,Math.PI*2); cx.fill();
    // left face
    const lg=cx.createLinearGradient(px-base/2,py,px,py-h);
    lg.addColorStop(0,'#d4a040'); lg.addColorStop(1,'#f0cc70');
    cx.fillStyle=lg;
    cx.beginPath(); cx.moveTo(px,py-h); cx.lineTo(px-base/2,py); cx.lineTo(px,py); cx.closePath(); cx.fill();
    // right face
    const rg2=cx.createLinearGradient(px,py,px+base/2,py-h*0.3);
    rg2.addColorStop(0,'#b08020'); rg2.addColorStop(1,'#c89830');
    cx.fillStyle=rg2;
    cx.beginPath(); cx.moveTo(px,py-h); cx.lineTo(px+base/2,py); cx.lineTo(px,py); cx.closePath(); cx.fill();
  }

  // ── THREE PYRAMIDS (bottom-right zone) ──
  drawPyramid(S*0.72, S*0.58, S*0.16, S*0.14);
  drawPyramid(S*0.84, S*0.62, S*0.12, S*0.10);
  drawPyramid(S*0.62, S*0.65, S*0.10, S*0.08);

  function drawPalm(px,py,h) {
    // trunk
    cx.strokeStyle='#8a5a20'; cx.lineWidth=h*0.12;
    cx.beginPath(); cx.moveTo(px,py); cx.bezierCurveTo(px+h*0.1,py-h*0.4,px-h*0.1,py-h*0.7,px,py-h); cx.stroke();
    // fronds
    cx.strokeStyle='#4a9040'; cx.lineWidth=1.5;
    for(let a=0;a<6;a++){
      const ang = (a/6)*Math.PI*2;
      cx.beginPath();
      cx.moveTo(px,py-h);
      cx.quadraticCurveTo(
        px+Math.cos(ang)*h*0.45, py-h+Math.sin(ang)*h*0.3,
        px+Math.cos(ang)*h*0.7,  py-h+Math.sin(ang)*h*0.45
      );
      cx.stroke();
    }
  }

  // ── PALM TREES along river banks ──
  [[S*0.25,S*0.12,S*0.065],[S*0.05,S*0.3,S*0.055],[S*0.29,S*0.5,S*0.06],
   [S*0.07,S*0.6,S*0.05],[S*0.32,S*0.78,S*0.055]].forEach(([px,py,h])=>drawPalm(px,py,h));

  // ── SPHINX (center-left) ──
  cx.save();
  cx.translate(S*0.42, S*0.38);
  // body
  const sbg = cx.createLinearGradient(-S*0.08,0,S*0.08,0);
  sbg.addColorStop(0,'#c89840'); sbg.addColorStop(1,'#e0b858');
  cx.fillStyle=sbg;
  cx.beginPath(); cx.ellipse(0,0,S*0.1,S*0.055,0,0,Math.PI*2); cx.fill();
  cx.fillStyle='#c89840';
  cx.beginPath(); cx.rect(-S*0.1,-S*0.055,S*0.2,S*0.055); cx.fill();
  // head
  cx.fillStyle='#d8aa50';
  cx.beginPath(); cx.ellipse(-S*0.07,-S*0.045,S*0.038,S*0.042,0,0,Math.PI*2); cx.fill();
  // headdress
  cx.fillStyle='#e8c060';
  cx.beginPath(); cx.rect(-S*0.1,-S*0.09,S*0.06,S*0.05); cx.fill();
  // eye
  cx.fillStyle='#5a3a10';
  cx.beginPath(); cx.ellipse(-S*0.065,-S*0.052,3,2,0,0,Math.PI*2); cx.fill();
  cx.restore();

  // ── SMALL DOTS/GEMS scattered ──
  cx.save();
  [[S*0.52,S*0.2,'#e85858'],[S*0.60,S*0.32,'#58a8e8'],[S*0.48,S*0.48,'#e85858'],
   [S*0.70,S*0.48,'#58a8e8'],[S*0.55,S*0.78,'#e8c058']].forEach(([gx,gy,gc])=>{
    cx.fillStyle=gc;
    cx.beginPath(); cx.moveTo(gx,gy-6); cx.lineTo(gx+5,gy); cx.lineTo(gx,gy+6); cx.lineTo(gx-5,gy); cx.closePath(); cx.fill();
    cx.fillStyle='rgba(255,255,255,0.5)';
    cx.beginPath(); cx.moveTo(gx,gy-6); cx.lineTo(gx+5,gy); cx.lineTo(gx,gy); cx.closePath(); cx.fill();
  });
  cx.restore();

  // ── GRID LINES (subtle) ──
  cx.save();
  cx.globalAlpha = 0.08;
  cx.strokeStyle = '#5a3a00'; cx.lineWidth = 1;
  const cell = S/6;
  for(let i=1;i<6;i++){
    cx.beginPath(); cx.moveTo(i*cell,0); cx.lineTo(i*cell,S); cx.stroke();
    cx.beginPath(); cx.moveTo(0,i*cell); cx.lineTo(S,i*cell); cx.stroke();
  }
  cx.restore();
}


function renderAvail() {
  const row = document.getElementById('blocksRow');
  row.innerHTML = '';
  const sz = 40;
  avail.forEach((block, i) => {
    const el = mkB(block, sz, sz, 'ablock');
    el.dataset.ai = i;
    bindDrag(el, 'avail', i, sz);
    row.appendChild(el);
  });
}

// ═══ RENDER BOARD ═══
// Block/slot sizes computed dynamically in renderBoard
const BSIZ = 28; // fallback
const SLOT_H = 38; // fallback

function getBoardSizes() {
  const board = document.getElementById('boardRow');
  const app   = document.getElementById('app');

  // Fixed board height: 3 rows * 56px + 2 gaps * 5px + 14px padding
  const FIXED_BOARD_H = 3 * 56 + 2 * 5 + 14;
  const boardW = board.clientWidth || (app.clientWidth - 20);

  const innerH = FIXED_BOARD_H - 14;
  const slotH  = Math.floor((innerH - 2 * 5) / 3); // = 56px
  const innerW = boardW - 14;
  const slotW  = Math.floor((innerW - 3 * 5) / 4);
  const bsiz   = Math.max(28, Math.min(slotW - 6, slotH - 10));

  return { slotH, bsiz };
}

function renderBoard() {
  const g = document.getElementById('boardGrid');
  g.innerHTML = '';
  const { slotH, bsiz } = getBoardSizes();

  for(let i=0; i<SLOTS; i++) {
    const slot = document.createElement('div');
    slot.className = 'pslot'; slot.dataset.slot = i;
    slot.style.height = slotH + 'px';

    const inn = document.createElement('div');
    inn.className = 'sinner';
    inn.style.cssText = `width:100%;height:${bsiz}px;`;

    if(prog[i]) {
      const be = mkB(prog[i], bsiz, bsiz, 'pblock');
      be.dataset.si = i;
      bindDrag(be, 'prog', i, bsiz);
      inn.appendChild(be);
    }
    const dot = document.createElement('div'); dot.className = 'dot';
    slot.appendChild(inn); slot.appendChild(dot);
    g.appendChild(slot);
  }
}

// ═══ DRAG ═══
let dg = {active:false, block:null, src:null, si:null, hover:null};

function bindDrag(el, src, idx, sz) {
  el.addEventListener('touchstart',e=>{
    if(running) return; e.preventDefault(); e.stopPropagation();
    startDg(e.touches[0].clientX,e.touches[0].clientY,src,idx,sz);
  },{passive:false});
  el.addEventListener('touchmove', e=>{e.preventDefault();moveDg(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
  el.addEventListener('touchend',  e=>{e.preventDefault();endDg(e.changedTouches[0].clientX,e.changedTouches[0].clientY);},{passive:false});
  el.addEventListener('mousedown',e=>{
    if(running) return; e.preventDefault();
    startDg(e.clientX,e.clientY,src,idx,sz);
    const mm=e=>moveDg(e.clientX,e.clientY);
    const mu=e=>{endDg(e.clientX,e.clientY);document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);};
    document.addEventListener('mousemove',mm);
    document.addEventListener('mouseup',mu);
  });
}

function startDg(cx,cy,src,idx,sz) {
  const block = src==='avail' ? avail[idx] : prog[idx];
  if(!block) return;
  dg = {active:true, block, src, si:idx, hover:null};
  const g = document.getElementById('ghost');
  g.innerHTML=''; g.appendChild(mkB(block,sz,sz));
  g.style.cssText=`display:block;width:${sz}px;height:${sz}px;left:${cx}px;top:${cy}px;border-radius:5px;`;
  if(src==='avail') {
    document.querySelectorAll('.ablock').forEach(el=>{ if(+el.dataset.ai===idx) el.style.opacity='0.3'; });
  } else {
    const s=document.querySelector(`.pslot[data-slot="${idx}"] .sinner`);
    if(s) s.style.opacity='0.3';
  }
}

function moveDg(cx,cy) {
  if(!dg.active) return;
  const g = document.getElementById('ghost');
  g.style.left=cx+'px'; g.style.top=cy+'px';
  g.style.display='none';
  const u=document.elementFromPoint(cx,cy);
  g.style.display='block';
  const slot=u?.closest('.pslot');
  if(dg.hover&&dg.hover!==slot) dg.hover.classList.remove('over');
  if(slot){slot.classList.add('over');dg.hover=slot;} else dg.hover=null;
}

function endDg(cx,cy) {
  if(!dg.active) return;
  document.getElementById('ghost').style.display='none';
  if(dg.hover) dg.hover.classList.remove('over');
  document.querySelectorAll('.ablock,.pblock').forEach(e=>e.style.opacity='1');
  document.querySelectorAll('.sinner').forEach(e=>e.style.opacity='1');
  const u=document.elementFromPoint(cx,cy);
  const slot=u?.closest('.pslot');
  if(slot) {
    const ti=+slot.dataset.slot;
    if(dg.src==='avail') prog[ti]={id:`${dg.block.dir}${idN++}`,...POOL[dg.block.dir]};
    else if(dg.src==='prog'&&dg.si!==ti){ const tmp=prog[ti];prog[ti]=dg.block;prog[dg.si]=tmp; }
  } else if(dg.src==='prog') prog[dg.si]=null;
  dg.active=false;
  renderAvail(); renderBoard();
}

// ═══ GAME LOGIC ═══
function hlSlot(i) {
  document.querySelectorAll('.pslot').forEach(s=>s.classList.remove('active'));
  document.querySelector(`.pslot[data-slot="${i}"]`)?.classList.add('active');
}
async function moveChar(dir) {
  if(dir==='forward') {
    const p={...pos};
    if(ori==='up')        p.y=Math.max(0,p.y-1);
    else if(ori==='down') p.y=Math.min(ROWS-1,p.y+1);
    else if(ori==='left') p.x=Math.max(0,p.x-1);
    else                   p.x=Math.min(COLS-1,p.x+1);
    await animTo(p.x,p.y); await sleep(80);
  } else {
    const newOri = dir==='left'
      ? {up:'left',left:'down',down:'right',right:'up'}[ori]
      : {up:'right',right:'down',down:'left',left:'up'}[ori];
    const deg = dir==='left' ? -90 : 90;
    const s = document.getElementById('sprite');
    // animate rotation
    const anim = s.animate(
      [{transform:'rotate(0deg)'},{transform:`rotate(${deg}deg)`}],
      {duration: TURN_MS, easing:'cubic-bezier(0.4,0,0.2,1)', fill:'forwards'}
    );
    await anim.finished.catch(()=>{});
    anim.cancel(); // reset transform so syncSprite takes over
    ori = newOri;
    syncSprite();
  }
}
async function run() {
  if(running||animating) return;
  let last=-1;
  for(let i=0;i<SLOTS;i++) if(prog[i]) last=i;
  if(last===-1){sErr();return;}
  running=true;
  const btn=document.getElementById('runBtn');
  btn.classList.add('running');
  toast(''); sStart(); await sleep(400);
  for(let i=0;i<=last;i++) {
    hlSlot(i); (i===last?sEnd():sStep()); await sleep(STEP_MS);
    if(prog[i]) {
      await moveChar(prog[i].dir||prog[i].direction); await sleep(STEP_MS);
      if(pos.x===GOAL.x&&pos.y===GOAL.y) {
        await sleep(200); toast('🎉 Hai vinto!','win');
        document.querySelectorAll('.pslot').forEach(s=>s.classList.remove('active'));
        btn.classList.remove('running'); btn.textContent='▶'; running=false;
        await sleep(800);
        for(let j=0;j<SLOTS;j++) prog[j]=null;
        renderBoard(); return;
      }
    } else { await sleep(STEP_MS); }
  }
  document.querySelectorAll('.pslot').forEach(s=>s.classList.remove('active'));
  btn.classList.remove('running'); btn.textContent='▶'; running=false;
  await sleep(400);
  for(let j=0;j<SLOTS;j++) prog[j]=null;
  renderBoard();
}

// ═══ INIT ═══
function init() {
  document.getElementById('gridWrap').style.position = 'relative';
  initGrid();
  renderAvail();
  renderBoard(); // initial render with fallback sizes

  // Pass 1: let CSS lay out everything
  requestAnimationFrame(() => requestAnimationFrame(() => {
    sizeGrid();           // set grid to exact square based on real bottom height
    // Pass 2: now grid height is known, re-render board to fill remaining space
    requestAnimationFrame(() => {
      renderBoard();
      drawBackground();
      syncSprite();
      setupSpriteDrag();
    });
  }));
}

init();

window.addEventListener('resize', () => {
  renderAvail();
  requestAnimationFrame(() => {
    sizeGrid();
    renderBoard();
    drawBackground();
    syncSprite();
  });
});


</script>

  if('serviceWorker' in navigator)
    window.addEventListener('load', () => navigator.serviceWorker.register('service-worker.js'));
